name: Build & Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject build metadata
        env:
          RELEASE_CHANNEL: stable
        run: node scripts/inject-build-metadata.js

      - name: Build
        working-directory: apps/desktop
        run: pnpm build

      - name: Package (.exe)
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm package

      - name: Publish to "Latest Build" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "Latest Build"
          prerelease: true
          body: |
            Auto-built from the latest code on master.
            Last updated: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}

            **Download VibeFlow-Setup.exe below and run it to install.**
          files: apps/desktop/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
