appId: app.vibeflow.desktop
electronVersion: "33.4.11"
productName: VibeFlow
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
npmRebuild: true
nativeRebuilder: sequential
asarUnpack:
  - "**/*.node"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: u2giants
  repo: vibeflow
  releaseType: release
